<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Obliger</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #001F6A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .content {
    text-align: center;
    max-width: 480px;
  }
  .logo {
    width: 120px;
    height: 120px;
    margin: 0 auto 28px;
  }
  h1 {
    color: #FFFFFF;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }
  p.tagline {
    color: #90A4AE;
    font-size: 16px;
    font-style: italic;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="content">
  <img class="logo" src="logo.png" alt="Obliger logo" />
  <h1>Obliger</h1>
  <p class="tagline">Shared task tracking and completion, so everyone stays in the loop.</p>
</div>

</body>
</html>
